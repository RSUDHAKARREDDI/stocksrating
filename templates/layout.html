<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}My App{% endblock %}</title>
  <style>
    body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
    min-height: 100vh;
-   display: flex;
-   flex-direction: column;
-   align-items: center;
+   /* Let content span full width */
+   display: block;
  }

    /* Header */
    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #333;
      color: white;
      padding: 10px 20px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .scrolling-text {
      flex: 1;
      margin-left: 20px;
      overflow: hidden;
      white-space: nowrap;
    }

    .scrolling-text span {
      display: inline-block;
      padding-left: 100%;
      animation: scroll-left 12s linear infinite;
    }

    @keyframes scroll-left {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    /* Menu Bar */
.menu-bar {
  width: 100%;
  background: #555;
  display: flex;
  justify-content: center;
  position: relative; /* Adds a stacking context */
  z-index: 1000;      /* Keeps the whole bar above the container */
}

    .menu-bar a {
      color: white;
      padding: 12px 20px;
      text-decoration: none;
      display: block;
    }

    .menu-bar a:hover {
      background: #777;
    }

    /* Container */
  .container {
    background: #fff;
    margin-top: 30px;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
-   width: 500px;
-   text-align: center;
+   /* Grow to page width, but keep a nice max */
+   width: min(1400px, 96vw);
+   margin-left: auto;
+   margin-right: auto;
+   text-align: center;
  }

    h2, h3 {
      color: #333;
      margin-bottom: 20px;
    }

    /* Messages */
    .message {
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    /* Dropdown Container */
.dropdown {
  position: relative;
  display: inline-block;
}

/* The actual button/link that triggers the dropdown */
.dropbtn {
  color: white;
  padding: 12px 20px;
  text-decoration: none;
  display: block;
  background: none;
  border: none;
  font-size: 16px;
  cursor: pointer;
}

/* Dropdown Content (Hidden by Default) */
.dropdown-content {
  display: none;
  position: absolute;
  background-color: #555;
  min-width: 200px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.3); /* Slightly deeper shadow */

  /* THIS IS THE KEY FIX */
  z-index: 9999;      /* Extremely high number to stay in front of everything */
  top: 100%;          /* Ensures it starts exactly at the bottom of the bar */
  left: 0;
}

/* Links inside the dropdown */
.dropdown-content a {
  color: white;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  border-bottom: 1px solid #666;
}

/* Change color of dropdown links on hover */
.dropdown-content a:hover {
  background-color: #777;
}

/* Show the dropdown menu on hover */
.dropdown:hover .dropdown-content {
  display: block;
}

/* Change the background color of the dropdown button when active */
.dropdown:hover .dropbtn {
  background-color: #777;
}
  </style>
</head>
<body>

  <!-- Header with Logo + Scrolling Text -->
  <div class="header">
    <div class="logo">MyLogo</div>
    <div class="scrolling-text">
      <span>Welcome to My App — Upload and manage your files easily!</span>
    </div>
  </div>

<div class="menu-bar">
  <a href="/my_holdings">Dashboard</a>

  <div class="dropdown">
    <button class="dropbtn">📁 Data & Uploads ▾</button>
    <div class="dropdown-content">
      <a href="/upload-files">Upload</a>
      <a href="/data-load">Data Load</a>
      <a href="/stock-reaction">Stock Reaction</a>
    </div>
  </div>

  <div class="dropdown">
    <button class="dropbtn">📈 Market Analysis ▾</button>
    <div class="dropdown-content">
      <a href="/latest-results">Latest Results</a>
      <a href="/screeners">Screeners</a>
      <a href="/quality-stocks">Quality Stocks</a>
      <a href="/delvr-pct-graph">Delivery %</a>
      <a href="/yr-new-high-low">52 Week H/L</a>
    </div>
  </div>

  <div class="dropdown">
    <button class="dropbtn">📊 Statistics ▾</button>
    <div class="dropdown-content">
      <a href="/daily-trade-stock-stats">Stock Delv Stats</a>
      <a href="/daily-trade-stats">Industry Delv Stats</a>
      <a href="/index-returns">Index Returns</a>
      <a href="/fii-sector-activity">FII Sector Activity</a>
    </div>
  </div>

  <a href="{{ url_for('logout') }}">🚪 Logout</a>
</div>

  </div>
  <div class="layout-wrapper">
  {% block content %}{% endblock %}
</div>




</body>
</html>
